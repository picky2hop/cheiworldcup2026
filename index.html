<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ทายผลฟุตบอลโลก 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap');
        body { font-family: 'Prompt', sans-serif; background-color: #f3f4f6; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass-header { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .btn-predict { transition: all 0.2s; }
        .btn-predict.selected { transform: scale(1.05); font-weight: bold; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .btn-predict.H.selected { background-color: #3b82f6; color: white; border-color: #3b82f6; }
        .btn-predict.D.selected { background-color: #10b981; color: white; border-color: #10b981; }
        .btn-predict.A.selected { background-color: #ef4444; color: white; border-color: #ef4444; }
        .loader { border-top-color: #3b82f6; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* สไตล์สำหรับ Bottom Sheet */
        .sheet-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; opacity: 0; transition: opacity 0.3s; }
        .sheet-backdrop.show { display: block; opacity: 1; }
        .bottom-sheet { position: fixed; bottom: -100%; left: 0; right: 0; background: white; border-radius: 24px 24px 0 0; z-index: 101; transition: bottom 0.3s cubic-bezier(0.4, 0, 0.2, 1); max-height: 85vh; display: flex; flex-direction: column; }
        .bottom-sheet.show { bottom: 0; }
        .sheet-content { overflow-y: auto; padding-bottom: 2rem; }
    </style>
</head>
<body class="pb-24 text-gray-800">

    <!-- Header -->
    <header class="glass-header sticky top-0 z-50 shadow-sm px-4 py-3 flex justify-between items-center border-b border-gray-200">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-trophy text-blue-600 text-2xl"></i>
            <h1 class="font-bold text-md leading-tight bg-clip-text text-transparent bg-gradient-to-r from-blue-700 to-purple-700">World Cup<br>2026</h1>
        </div>
        <div class="flex items-center gap-2 text-right">
            <div>
                <p class="text-xs text-gray-500">ผู้ใช้งาน</p>
                <p class="font-bold text-sm text-gray-800" id="userNameDisplay">กำลังโหลด...</p>
            </div>
            <img id="userProfilePic" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="w-10 h-10 rounded-full border-2 border-blue-500 object-cover shadow-sm">
        </div>
    </header>

    <div id="loadingOverlay" class="fixed inset-0 bg-white/80 z-[100] flex flex-col items-center justify-center">
        <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
        <p class="text-gray-600 font-semibold" id="loadingText">กำลังโหลดข้อมูล...</p>
    </div>

    <main class="p-4 max-w-md mx-auto">
        
        <section id="tab-leaderboard" class="tab-content active">
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><i class="fa-solid fa-ranking-star text-yellow-500"></i> อันดับคะแนนสูงสุด</h2>
            <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-100" id="leaderboardContainer"></div>
        </section>

        <!-- Tab Results -->
        <section id="tab-results" class="tab-content">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold flex items-center gap-2"><i class="fa-solid fa-futbol text-green-500"></i> ผลการแข่งขันจริง</h2>
            </div>
            <div class="bg-green-50 border border-green-200 text-green-800 text-xs p-3 rounded-xl mb-4 shadow-sm flex items-center gap-2">
                <i class="fa-solid fa-hand-pointer text-lg animate-bounce"></i> แตะที่การ์ดแข่งขัน เพื่อดูว่าเพื่อนๆ ทายผลฝั่งไหนกันบ้าง!
            </div>
            <div class="space-y-3" id="resultsContainer"></div>
        </section>

        <section id="tab-predict" class="tab-content">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold flex items-center gap-2"><i class="fa-solid fa-pen-to-square text-blue-500"></i> ส่งผลทายของคุณ</h2>
            </div>
            <div class="bg-blue-50 border border-blue-200 text-blue-800 text-xs p-3 rounded-xl mb-4 shadow-sm">
                <i class="fa-solid fa-circle-info mr-1"></i> เลือกทายผล เหย้า เสมอ หรือเยือน (ทายถูกรับคู่ละ 3 แต้ม) เมื่อเลือกครบแล้วต้องกดปุ่ม "บันทึกการทายผล" ด้านล่างสุดด้วยครับ
            </div>
            <form id="predictionForm">
                <div class="space-y-4" id="predictContainer"></div>
                <button type="button" onclick="submitPredictions()" class="mt-6 w-full bg-gradient-to-r from-blue-600 to-blue-800 text-white font-bold py-4 rounded-xl shadow-lg hover:shadow-xl transition-all flex justify-center items-center gap-2">
                    <i class="fa-solid fa-cloud-arrow-up"></i> บันทึกการทายผล
                </button>
            </form>
        </section>

    </main>

    <nav class="fixed bottom-0 w-full bg-white border-t border-gray-200 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-50">
        <!-- เมนูด้านล่าง โค้ดเดิม... -->
        <div class="flex justify-around max-w-md mx-auto">
            <button onclick="switchTab('leaderboard')" class="tab-btn active flex-1 py-3 flex flex-col items-center text-gray-400 hover:text-blue-600 transition-colors" data-target="tab-leaderboard">
                <i class="fa-solid fa-ranking-star text-xl mb-1"></i><span class="text-[10px] font-semibold">จัดอันดับ</span>
            </button>
            <button onclick="switchTab('results')" class="tab-btn flex-1 py-3 flex flex-col items-center text-gray-400 hover:text-blue-600 transition-colors" data-target="tab-results">
                <i class="fa-solid fa-futbol text-xl mb-1"></i><span class="text-[10px] font-semibold">ผลแข่ง</span>
            </button>
            <button onclick="switchTab('predict')" class="tab-btn flex-1 py-3 flex flex-col items-center text-gray-400 hover:text-blue-600 transition-colors relative" data-target="tab-predict">
                <div class="absolute -top-4 bg-blue-600 text-white w-12 h-12 rounded-full flex items-center justify-center shadow-lg border-4 border-white"><i class="fa-solid fa-pen text-xl"></i></div>
                <span class="text-[10px] font-semibold mt-7">ทายผล</span>
            </button>
        </div>
    </nav>

    <!-- 🌟 โครงสร้างแผง Bottom Sheet ใหม่ล่าสุด 🌟 -->
    <div id="sheetBackdrop" class="sheet-backdrop" onclick="closeMatchStats()"></div>
    <div id="bottomSheet" class="bottom-sheet shadow-[0_-15px_30px_rgba(0,0,0,0.15)]">
        <!-- ที่จับสำหรับลากลง (ตกแต่ง) -->
        <div class="flex justify-center p-3 cursor-pointer" onclick="closeMatchStats()">
            <div class="w-12 h-1.5 bg-gray-300 rounded-full"></div>
        </div>
        
        <div id="sheetContent" class="sheet-content px-6 pt-2">
            <!-- ข้อมูล Dynamic จะถูกแทรกที่นี่ผ่าน JavaScript -->
        </div>
    </div>

    <!-- Alert Modal เดิม -->
    <div id="alertModal" class="fixed inset-0 bg-black/60 z-[200] hidden items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 max-w-sm w-full text-center shadow-2xl transform transition-all scale-95 opacity-0" id="alertModalContent">
            <div id="alertIcon" class="text-4xl mb-3"></div><h3 id="alertTitle" class="text-xl font-bold mb-2"></h3>
            <p id="alertMessage" class="text-gray-600 mb-6"></p>
            <button onclick="closeModal()" class="bg-blue-600 text-white font-bold py-2 px-8 rounded-xl w-full hover:bg-blue-700">ตกลง</button>
        </div>
    </div>

    <script>
        // ==========================================
        const GAS_URL = 'YOUR_GAS_WEB_APP_URL'; // <--- อย่าลืมวางลิงก์
        const LIFF_ID = 'YOUR_LINE_LIFF_ID';    // <--- อย่าลืมวางรหัส LIFF

        let currentUser = { uid: 'test_user_01', displayName: 'ผู้เล่นทดสอบ', pictureUrl: 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}; 
        let allMatches = [];
        let userPreds = {};
        let myPredictions = {}; 
        let allMatchPredictions = {}; // ตัวแปรเก็บสถิติใครทายอะไร

        const flagMap = {
            "เช็กเกีย": "🇨🇿", "แอฟริกาใต้": "🇿🇦", "สวิตเซอร์แลนด์": "🇨🇭", "บอสเนีย": "🇧🇦",
            "แคนาดา": "🇨🇦", "กาตาร์": "🇶🇦", "เม็กซิโก": "🇲🇽", "เกาหลีใต้": "🇰🇷",
            "สหรัฐอเมริกา": "🇺🇸", "ออสเตรเลีย": "🇦🇺", "สกอตแลนด์": "🏴󠁧󠁢󠁳󠁣󠁴󠁿", "โมร็อกโก": "🇲🇦",
            "บราซิล": "🇧🇷", "เฮติ": "🇭🇹", "ตุรกี": "🇹🇷", "ปารากวัย": "🇵🇾",
            "เนเธอร์แลนด์": "🇳🇱", "สวีเดน": "🇸🇪", "เยอรมนี": "🇩🇪", "ไอวอรีโคสต์": "🇨🇮",
            "เอกวาดอร์": "🇪🇨", "กูราเซา": "🇨🇼", "ตูนิเซีย": "🇹🇳", "ญี่ปุ่น": "🇯🇵",
            "สเปน": "🇪🇸", "ซาอุดีอาระเบีย": "🇸🇦", "เบลเยียม": "🇧🇪", "อิหร่าน": "🇮🇷",
            "อุรุกวัย": "🇺🇾", "เคปเวิร์ด": "🇨🇻", "นิวซีแลนด์": "🇳🇿", "อียิปต์": "🇪🇬",
            "อาร์เจนตินา": "🇦🇷", "ออสเตรีย": "🇦🇹", "ฝรั่งเศส": "🇫🇷", "อิรัก": "🇮🇶",
            "นอร์เวย์": "🇳🇴", "เซเนกัล": "🇸🇳", "จอร์แดน": "🇯🇴", "แอลจีเรีย": "🇩🇿",
            "โปรตุเกส": "🇵🇹", "อุซเบกิสถาน": "🇺🇿", "อังกฤษ": "🏴󠁧󠁢󠁥󠁮󠁧󠁿", "กานา": "🇬🇭",
            "ปานามา": "🇵🇦", "โครเอเชีย": "🇭🇷", "โคลอมเบีย": "🇨🇴", "ดีอาร์ คองโก": "🇨🇩"
        };
        function addFlag(countryName) { return `${flagMap[countryName] || "🏳️"} ${countryName}`; }

        window.onload = async () => {
            if(LIFF_ID && LIFF_ID !== 'YOUR_LINE_LIFF_ID') {
                try {
                    await liff.init({ liffId: LIFF_ID });
                    if (liff.isLoggedIn()) {
                        const profile = await liff.getProfile();
                        currentUser = { uid: profile.userId, displayName: profile.displayName, pictureUrl: profile.pictureUrl || currentUser.pictureUrl };
                    } else { liff.login(); }
                } catch (err) { console.error('LIFF Error:', err); }
            }
            document.getElementById('userNameDisplay').innerText = currentUser.displayName;
            document.getElementById('userProfilePic').src = currentUser.pictureUrl;
            fetchData();
        };

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => { el.classList.remove('text-blue-600'); if(el.dataset.target !== 'tab-predict') el.classList.add('text-gray-400'); });
            document.getElementById('tab-' + tabId).classList.add('active');
            const activeBtn = document.querySelector(`[data-target="tab-${tabId}"]`);
            if(tabId !== 'predict') activeBtn.classList.add('text-blue-600');
        }

        function formatDateTime(dateString) {
            if (!dateString) return "ยังไม่ระบุเวลา";
            const d = new Date(dateString);
            if(isNaN(d)) return dateString;
            const thMonths = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
            return `${d.getDate()} ${thMonths[d.getMonth()]} ${(d.getFullYear() + 543).toString().slice(-2)} • ${d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' })} น.`;
        }

        async function fetchData() {
            showLoading(true, "กำลังดึงข้อมูลล่าสุด...");
            try {
                const response = await fetch(`${GAS_URL}?action=getData&uid=${currentUser.uid}`);
                const data = await response.json();
                if(data.status === 'success') {
                    allMatches = data.matches;
                    userPreds = data.userPredictions || {};
                    myPredictions = {...userPreds}; 
                    allMatchPredictions = data.matchPredictions || {}; // เก็บข้อมูลคนทายทั้งหมด
                    
                    renderLeaderboard(data.leaderboard);
                    renderResults(allMatches);
                    renderPredictForm(allMatches);
                }
            } catch (error) { console.error(error); showAlert('❌ เกิดข้อผิดพลาด', 'ไม่สามารถดึงข้อมูลได้'); } 
            finally { showLoading(false); }
        }

        function renderLeaderboard(leaderboard) {
            const container = document.getElementById('leaderboardContainer');
            if(leaderboard.length === 0) { container.innerHTML = '<div class="p-6 text-center text-gray-500">ยังไม่มีผู้เข้าแข่งขันในระบบ</div>'; return; }
            let html = '<ul class="divide-y divide-gray-100">';
            leaderboard.forEach((user, index) => {
                let rankIcon = `<span class="font-bold text-gray-500 w-6 text-center">${index + 1}</span>`;
                if(index === 0) rankIcon = `<i class="fa-solid fa-medal text-yellow-400 text-xl w-6 text-center"></i>`;
                else if(index === 1) rankIcon = `<i class="fa-solid fa-medal text-gray-400 text-xl w-6 text-center"></i>`;
                else if(index === 2) rankIcon = `<i class="fa-solid fa-medal text-amber-600 text-xl w-6 text-center"></i>`;
                const isMe = user.name === currentUser.displayName;
                const bgClass = isMe ? 'bg-blue-50' : 'bg-white';
                html += `
                    <li class="flex items-center justify-between p-4 ${bgClass} hover:bg-gray-50 transition-colors">
                        <div class="flex items-center gap-3">
                            ${rankIcon}
                            <img src="${user.pic}" class="w-9 h-9 rounded-full object-cover border border-gray-200 shadow-sm">
                            <div><p class="font-bold text-gray-800 text-sm ${isMe ? 'text-blue-700' : ''}">${user.name} ${isMe ? '(คุณ)' : ''}</p></div>
                        </div>
                        <div class="text-right"><span class="font-extrabold text-lg text-blue-600">${user.score}</span><span class="text-[10px] text-gray-500 block -mt-1">คะแนน</span></div>
                    </li>`;
            });
            html += '</ul>'; container.innerHTML = html;
        }

        function renderResults(matches) {
            const container = document.getElementById('resultsContainer');
            let html = '';
            const predTextMap = {'H': 'เหย้าชนะ', 'D': 'เสมอ', 'A': 'เยือนชนะ'};
            matches.forEach(m => {
                const isFinished = m.rawResult && m.rawResult !== '';
                const displayResult = isFinished ? m.rawResult : 'VS';
                const textColor = isFinished ? 'text-blue-600 font-extrabold' : 'text-gray-400';
                const myPred = myPredictions[m.id];
                let myPredictionHTML = '';
                
                if (myPred) {
                    let statusColor = 'text-gray-500', pointsText = 'รอผลแข่ง', icon = '<i class="fa-solid fa-clock-rotate-left"></i>';
                    if (isFinished) {
                        if (myPred === m.result) { statusColor = 'text-green-600'; pointsText = '+3 แต้ม'; icon = '<i class="fa-solid fa-circle-check"></i>'; } 
                        else { statusColor = 'text-red-500'; pointsText = '0 แต้ม'; icon = '<i class="fa-solid fa-circle-xmark"></i>'; }
                    }
                    myPredictionHTML = `
                        <div class="mt-3 bg-gray-50 border border-gray-100 rounded-lg p-2.5 flex justify-between items-center text-xs">
                            <div class="text-gray-600">คุณทาย: <span class="font-bold text-gray-800">${predTextMap[myPred]}</span></div>
                            <div class="font-bold ${statusColor}">${icon} ${pointsText}</div>
                        </div>`;
                }

                // สังเกตว่าเพิ่ม cursor-pointer และแอนิเมชันให้การ์ดกดได้
                html += `
                    <div onclick="openMatchStats('${m.id}')" class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex flex-col relative cursor-pointer active:scale-95 transition-transform">
                        <div class="absolute top-4 right-4 text-gray-300 text-xs"><i class="fa-solid fa-chevron-right"></i></div>
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-xs font-bold text-gray-500">คู่ที่ ${m.id}</span>
                            <span class="text-[10px] text-gray-400 pr-5"><i class="fa-regular fa-calendar"></i> ${formatDateTime(m.matchTime)}</span>
                        </div>
                        <div class="flex justify-between items-center pr-5">
                            <div class="flex-1 text-right font-bold text-gray-800 text-sm pr-2">${addFlag(m.home)}</div>
                            <div class="px-4 py-1.5 bg-gray-100 rounded-xl text-center text-sm font-bold min-w-[65px] ${textColor}">${displayResult}</div>
                            <div class="flex-1 text-left font-bold text-gray-800 text-sm pl-2">${addFlag(m.away)}</div>
                        </div>
                        ${myPredictionHTML}
                    </div>`;
            });
            container.innerHTML = html;
        }

        // 🌟 ฟังชั่นใหม่: เปิด Bottom Sheet แสดงสถิติ
        function openMatchStats(matchId) {
            const match = allMatches.find(m => m.id === matchId);
            const stats = allMatchPredictions[matchId] || { 'H': [], 'D': [], 'A': [] };
            
            const countH = stats.H.length;
            const countD = stats.D.length;
            const countA = stats.A.length;
            const total = countH + countD + countA;

            const pctH = total === 0 ? 0 : (countH / total) * 100;
            const pctD = total === 0 ? 0 : (countD / total) * 100;
            const pctA = total === 0 ? 0 : (countA / total) * 100;

            // 1. หัวเรื่อง
            let html = `
                <div class="text-center mb-4">
                    <span class="text-xs font-bold bg-blue-100 text-blue-800 px-2 py-0.5 rounded-full">สรุปการทายผล คู่ที่ ${matchId}</span>
                    <h3 class="text-lg font-extrabold mt-3 text-gray-800">${addFlag(match.home)} <span class="text-sm text-gray-400 font-normal">vs</span> ${addFlag(match.away)}</h3>
                    <p class="text-[10px] text-gray-500 mt-1">ผู้ร่วมทายผลทั้งหมด: <span class="font-bold">${total}</span> คน</p>
                </div>
            `;

            // 2. หลอด Progress Bar สถิติ
            if (total > 0) {
                html += `
                    <div class="w-full h-3 bg-gray-200 rounded-full overflow-hidden flex mb-2">
                        <div style="width: ${pctH}%" class="bg-blue-500 transition-all"></div>
                        <div style="width: ${pctD}%" class="bg-green-500 transition-all"></div>
                        <div style="width: ${pctA}%" class="bg-red-500 transition-all"></div>
                    </div>
                    <div class="flex justify-between text-[10px] text-gray-500 font-bold mb-6">
                        <span class="text-blue-600">เหย้า ${Math.round(pctH)}%</span>
                        <span class="text-green-600">เสมอ ${Math.round(pctD)}%</span>
                        <span class="text-red-500">เยือน ${Math.round(pctA)}%</span>
                    </div>
                `;
            } else {
                html += `<div class="text-center text-xs text-gray-400 my-6 bg-gray-50 py-3 rounded-lg border border-gray-100">ยังไม่มีใครทายผลคู่นี้</div>`;
            }

            // 3. ป้ายชื่อคนทาย
            html += `<div class="space-y-4">`;
            html += buildUserGroupHTML(`เชียร์ ${match.home}`, 'text-blue-600', 'border-blue-200', 'bg-blue-50', stats.H);
            html += buildUserGroupHTML(`ทายเสมอ`, 'text-green-600', 'border-green-200', 'bg-green-50', stats.D);
            html += buildUserGroupHTML(`เชียร์ ${match.away}`, 'text-red-500', 'border-red-200', 'bg-red-50', stats.A);
            html += `</div>`;

            document.getElementById('sheetContent').innerHTML = html;

            // สั่งโชว์ Bottom Sheet
            document.getElementById('sheetBackdrop').classList.add('show');
            setTimeout(() => { document.getElementById('bottomSheet').classList.add('show'); }, 10);
        }

        // ฟังชั่นสร้างบล็อกรายชื่อคนทายให้สวยงาม
        function buildUserGroupHTML(title, textColor, borderColor, bgColor, users) {
            if (users.length === 0) return '';
            let out = `
                <div>
                    <h4 class="text-sm font-bold ${textColor} mb-2 flex items-center justify-between border-b pb-1">
                        <span>${title}</span>
                        <span class="bg-gray-100 text-gray-600 text-[10px] px-2 py-0.5 rounded-full">${users.length} คน</span>
                    </h4>
                    <div class="flex flex-wrap gap-2">
            `;
            users.forEach(u => {
                const isMe = u.name === currentUser.displayName;
                out += `
                    <div class="flex items-center gap-1.5 ${bgColor} border ${borderColor} px-2 py-1 rounded-full shadow-[0_1px_2px_rgba(0,0,0,0.05)]">
                        <img src="${u.pic}" class="w-5 h-5 rounded-full object-cover border border-white">
                        <span class="text-[10px] font-semibold text-gray-700 whitespace-nowrap">${u.name} ${isMe ? '(คุณ)' : ''}</span>
                    </div>
                `;
            });
            out += `</div></div>`;
            return out;
        }

        function closeMatchStats() {
            document.getElementById('bottomSheet').classList.remove('show');
            setTimeout(() => { document.getElementById('sheetBackdrop').classList.remove('show'); }, 300);
        }

        function renderPredictForm(matches) {
            // โค้ดเรนเดอร์ฟอร์มทายผลเหมือนเดิมเป๊ะครับ
            const container = document.getElementById('predictContainer');
            let html = '';
            const now = new Date();
            matches.forEach(m => {
                const isFinished = m.result && m.result !== '';
                let isTimeOver = false;
                if(m.matchTime) { const matchDate = new Date(m.matchTime); if(!isNaN(matchDate) && now >= matchDate) { isTimeOver = true; } }
                const isLocked = isFinished || isTimeOver;
                const currentPred = myPredictions[m.id] || '';
                let statusBadge = '';
                if(isFinished) { statusBadge = '<span class="text-xs text-green-600 font-bold"><i class="fa-solid fa-check-circle"></i> สรุปแต้มแล้ว</span>'; } 
                else if (isTimeOver) { statusBadge = '<span class="text-xs text-red-500 font-bold"><i class="fa-solid fa-lock"></i> ปิดรับทายผล</span>'; } 
                else { statusBadge = `<span class="text-[10px] text-blue-600 font-medium"><i class="fa-regular fa-clock"></i> เริ่มแข่ง: ${formatDateTime(m.matchTime)}</span>`; }
                html += `
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                        <div class="flex justify-between items-center mb-3"><span class="text-xs font-bold text-blue-800 bg-blue-100 px-2 py-0.5 rounded">คู่ที่ ${m.id}</span>${statusBadge}</div>
                        <div class="flex justify-between items-center mb-4">
                            <div class="flex-1 text-right pr-2 font-bold text-sm text-gray-700 leading-tight">${addFlag(m.home)}</div>
                            <div class="text-gray-300 text-xs">vs</div>
                            <div class="flex-1 text-left pl-2 font-bold text-sm text-gray-700 leading-tight">${addFlag(m.away)}</div>
                        </div>
                        <div class="grid grid-cols-3 gap-2">
                            <button type="button" ${isLocked ? 'disabled' : ''} onclick="selectPrediction('${m.id}', 'H')" class="btn-predict H ${currentPred === 'H' ? 'selected' : ''} ${isLocked ? 'opacity-40 cursor-not-allowed' : ''} py-2.5 rounded-xl border border-gray-200 text-xs font-semibold text-gray-600">เหย้าชนะ</button>
                            <button type="button" ${isLocked ? 'disabled' : ''} onclick="selectPrediction('${m.id}', 'D')" class="btn-predict D ${currentPred === 'D' ? 'selected' : ''} ${isLocked ? 'opacity-40 cursor-not-allowed' : ''} py-2.5 rounded-xl border border-gray-200 text-xs font-semibold text-gray-600">เสมอ</button>
                            <button type="button" ${isLocked ? 'disabled' : ''} onclick="selectPrediction('${m.id}', 'A')" class="btn-predict A ${currentPred === 'A' ? 'selected' : ''} ${isLocked ? 'opacity-40 cursor-not-allowed' : ''} py-2.5 rounded-xl border border-gray-200 text-xs font-semibold text-gray-600">เยือนชนะ</button>
                        </div>
                    </div>`;
            });
            container.innerHTML = html;
        }

        function selectPrediction(matchId, result) { myPredictions[matchId] = result; renderPredictForm(allMatches); }

        async function submitPredictions() {
            showLoading(true, "กำลังบันทึกข้อมูล...");
            const payload = { uid: currentUser.uid, displayName: currentUser.displayName, pictureUrl: currentUser.pictureUrl, predictions: myPredictions };
            try {
                const response = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload), headers: { 'Content-Type': 'text/plain;charset=utf-8' } });
                const data = await response.json();
                if(data.status === 'success') { showAlert('🎉 สำเร็จ!', 'บันทึกการทายผลของคุณเรียบร้อยแล้ว', 'success'); fetchData(); } 
                else { throw new Error(data.message); }
            } catch (error) { console.error(error); showAlert('❌ บันทึกไม่สำเร็จ', 'เกิดข้อผิดพลาดในการเชื่อมต่อหลังบ้าน'); } 
            finally { showLoading(false); }
        }

        function showLoading(show, text = "") { const overlay = document.getElementById('loadingOverlay'); if(show) { document.getElementById('loadingText').innerText = text; overlay.classList.remove('hidden'); overlay.classList.add('flex'); } else { overlay.classList.add('hidden'); overlay.classList.remove('flex'); } }
        function showAlert(title, message, type = 'error') {
            const modal = document.getElementById('alertModal'), content = document.getElementById('alertModalContent'), iconEl = document.getElementById('alertIcon');
            document.getElementById('alertTitle').innerText = title; document.getElementById('alertMessage').innerText = message;
            if(type === 'success') iconEl.innerHTML = '<i class="fa-regular fa-circle-check text-green-500"></i>'; else iconEl.innerHTML = '<i class="fa-solid fa-triangle-exclamation text-red-500"></i>';
            modal.classList.remove('hidden'); modal.classList.add('flex'); setTimeout(() => { content.classList.remove('scale-95', 'opacity-0'); content.classList.add('scale-100', 'opacity-100'); }, 10);
        }
        function closeModal() {
            const modal = document.getElementById('alertModal'), content = document.getElementById('alertModalContent');
            content.classList.remove('scale-100', 'opacity-100'); content.classList.add('scale-95', 'opacity-0');
            setTimeout(() => { modal.classList.add('hidden'); modal.classList.remove('flex'); }, 300);
        }
    </script>
</body>
</html>
